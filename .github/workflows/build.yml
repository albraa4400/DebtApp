name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake libffi-dev \
          libssl-dev libltdl-dev
        
    - name: Install buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython
        
    - name: Accept Android SDK licenses automatically
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        echo "✅ تم تهيئة مجلد Android"
        
    - name: Build APK
      run: |
        # فرض استخدام build tools 33.0.2
        sed -i 's/android.build_tools = .*/android.build_tools = 33.0.2/g' buildozer.spec
        buildozer android debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: bin/*.apk
        if-no-files-found: warn
