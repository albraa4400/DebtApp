name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3-dev zip unzip openjdk-17-jdk libffi-dev libssl-dev libtinfo6 libncurses6 libtool
          pip install --upgrade pip
          pip install "cython<3.0.0" buildozer kivy

      - name: Build with Buildozer
        run: |
          # محاولة التنظيف فقط إذا كان المجلد موجوداً لتجنب الخطأ السابق
          if [ -d ".buildozer" ]; then buildozer android clean; fi
          # بدء البناء مباشرة
          yes | buildozer -v android debug
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DebtApp-APK
          path: bin/*.apk
          
