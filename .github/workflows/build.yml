name: Build APK Stable

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3-pip \
            python3-setuptools \
            python3-dev \
            build-essential \
            git zip unzip \
            openjdk-17-jdk \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev \
            libsqlite3-dev \
            liblzma-dev \
            libgdbm-dev \
            libnss3-dev

      - name: Install Python tools
        run: |
          python3 -m pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer==1.5.0
          pip install kivy==2.2.1

      - name: Initialize buildozer
        run: |
          buildozer init || true

      - name: Configure buildozer
        run: |
          sed -i 's/title = .*/title = Debt App/' buildozer.spec
          sed -i 's/package.name = .*/package.name = debtapp/' buildozer.spec
          sed -i 's/package.domain = .*/package.domain = org.albraa/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3,kivy/' buildozer.spec
          sed -i 's/android.api = .*/android.api = 33/' buildozer.spec
          sed -i 's/android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/android.ndk = .*/android.ndk = 25b/' buildozer.spec
          sed -i 's/android.sdk = .*/android.sdk = 33/' buildozer.spec
          sed -i 's/# android.build_tools_version = .*/android.build_tools_version = 33.0.2/' buildozer.spec

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DebtApp-APK
          path: bin/*.apk
