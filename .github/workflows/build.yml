name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # للسماح بالتشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git zip unzip openjdk-17-jdk \
          python3-pip autoconf libtool \
          pkg-config zlib1g-dev libncurses5-dev \
          libncursesw5-dev libtinfo5 cmake libffi-dev \
          libssl-dev libltdl-dev
          
    - name: Install buildozer and dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer cython
        
    - name: Verify buildozer.spec exists
      run: |
        if [ ! -f "buildozer.spec" ]; then
          echo "❌ ملف buildozer.spec غير موجود!"
          exit 1
        fi
        
    - name: Prepare environment variables
      run: |
        echo "ANDROID_HOME=$HOME/.android" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$HOME/.android" >> $GITHUB_ENV
        echo "PATH=$PATH:$HOME/.android/cmdline-tools/latest/bin:$HOME/.android/platform-tools" >> $GITHUB_ENV
        
    - name: Build with detailed output
      run: |
        echo "🔨 بدء بناء APK..."
        buildozer -v android debug
      continue-on-error: false
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: bin/*.apk
        if-no-files-found: error
